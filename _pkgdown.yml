url: https://mjfrigaard.github.io/dopingdata/

navbar:
  bg: primary       # paint the bar with $primary (Teal)
  type: dark        # use light text for contrast on the Teal bar
  components:
    articles:
      text: Articles
      menu:
      - text: "Harvesting Data"
      - text: USADA Sanctions
        href: articles/scraping-usada-sanctions.html
      - text: -------
      - text: "Wrangling Data"
      - text: Sanction Announced (Date)
        href: articles/clean-dates.html
      - text: Sports
        href: articles/clean-sports.html
      - text: "Classifying Substances"
      - text: Adverse Analytical Findings
        href: articles/classify.html
      - text: "Visualizing Substances"
      - text: Counts
        href: articles/viz-counts.html

template:
  bootstrap: 5
  theme: arrow-light
  bslib:
    primary:   "#2A6F77"   # Teal            — links, buttons, navbar accent
    secondary: "#1B2A41"   # Midnight Navy   — neutral text emphasis
    success:   "#5B8C5A"   # Avocado Green
    info:      "#E8A33D"   # Harvest Gold
    warning:   "#D2562B"   # Burnt Orange
    danger:    "#B83A4B"   # Brick Red
    code-color: "#3E2A1E"  # Chocolate Brown — inline & block code text
    code-bg:    "#F2E6C2"  # Cream           — inline & block code background
    base_font:
      google: Ubuntu
    heading_font:
      google: Fira Sans Condensed
    code_font:
      google: Ubuntu Mono
